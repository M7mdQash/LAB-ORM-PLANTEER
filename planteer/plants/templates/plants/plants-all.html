{% extends "main/base.html" %}

{% block content %}
<div class="container py-5">

  <div class="d-flex justify-content-between align-items-center mb-4">
    <h1 class="fw-bold">All Plants</h1>
    {% if request.user.is_staff %}
    <a href="{% url 'plants:create_view' %}" class="btn btn-success">
      <i class="fas fa-plus me-2"></i>Add Plant
    </a>
    {% endif %}
  </div>

  <!-- Filters -->
  <form method="GET" action="{% url 'plants:all_plants_view' %}" class="row g-3 mb-5 p-4 bg-light rounded-3">
    <!-- category-->
    <div class="col-md-4">
      <label for="category" class="form-label fw-semibold">Category</label>
      <select name="category" id="category" class="form-select">
        <option value="">All Categories</option>
        {% for value, label in categories %}
          <option value="{{ value }}" {% if selected_category == value %}selected{% endif %}>{{ label }}</option>
        {% endfor %}
      </select>
    </div>
    <!-- is edible? -->
    <div class="col-md-4">
      <label for="is_edible" class="form-label fw-semibold">Edibility</label>
      <select name="is_edible" id="is_edible" class="form-select">
        <option value="">All</option>
        <option value="true" {% if selected_edible == 'true' %}selected{% endif %}>Edible</option>
        <option value="false" {% if selected_edible == 'false' %}selected{% endif %}>Not Edible</option>
      </select>
    </div>
    <!-- countries -->
     <div class="col-md-4">
      <label for="country" class="form-label fw-semibold">Country</label>
      <select name="country" id="country" class="form-select">
        <option value="">All Countries</option>
        {% for country in countries %}
          <option value="{{ country.id }}" {% if selected_country == country.id %}selected{% endif %}>{{ country.name }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="col-md-4 d-flex align-items-end gap-2">
      <button type="submit" class="btn btn-dark flex-grow-1">Filter</button>
      <a href="{% url 'plants:all_plants_view' %}" class="btn btn-outline-secondary flex-grow-1">Reset</a>
    </div>
  </form>

  <!-- Plant Grid -->
  {% if plants %}
    {% include "plants/plants-card.html" %}
    
      
  {% else %}
    <div class="text-center py-5">
      <i class="fas fa-seedling fa-4x text-muted mb-3"></i>
      <h4 class="text-muted">No plants found</h4>
      <p class="text-muted">Try adjusting your filters or <a href="{% url 'plants:create_view' %}">add a new plant</a>.</p>
    </div>
  {% endif %}

</div>
{% endblock %}
